services:
  database:
    image: postgres:17.4-alpine3.21
    volumes:
      - postgres-data:/var/lib/postgres/data
    ports:
      - "127.0.0.1:5432:5432"
    env_file:
      - .env
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  migrations:
    build: .
    command: sh -c "npm ci --save-dev && npm run migrate"
    depends_on:
      - database
    env_file:
      - .env
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  web:
    build: .
    ports:
      - "127.0.0.1:5000:5000"
    depends_on:
      - database
      - migrations
      - minio
    env_file:
      - .env
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

# add the new service here
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    environment:
      MINIO_ROOT_USER: ${AWS_S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_S3_SECRET_ACCESS_KEY}
    command: minio server /data
    volumes:
      - minio-data:/data

# make sure to use volumes here
volumes:
  minio-data:
  postgres-data:
